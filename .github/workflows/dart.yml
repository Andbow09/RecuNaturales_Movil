# separate terms of service, privacy policy, and support
# documentation.

name: Build Flutter APK and Deploy

on:
  push:
    branches: ["flutterflow"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Java (for Android)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Package outputs
        run: |
          mkdir -p out
          cp build/app/outputs/flutter-apk/app-release.apk out/ || true

      - name: Deploy to mobile repo
        run: |
          git clone https://x-access-token:${{ secrets.ACCESS_TOKEN }}@github.com/Andbow09/RecuNaturales_Movil_APK mobile-repo
          rm -rf mobile-repo/*
          cp out/app-release.apk mobile-repo/ || true
          cd mobile-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy Android build"
          git push 
